<div class="modulo-productos">
    <div class="contenedor-menu">
        <div *ngFor="let cat of categorias$ | async" class="acordeon-categoria">
            <div class="card-categoria" (click)="toggleCategoria(cat)">
                <h3>{{ cat.nombre | titlecase }}</h3>
                <div class="arrow" [class.abierto]="categoriaAbiertaId === cat.id">❯</div>
            </div>

            <div class="panel-productos" [class.abierto]="categoriaAbiertaId === cat.id">
                <div *ngIf="(productos$ | async) as productos">
                    <!-- 1. El clic en la tarjeta ahora suma el producto directamente -->
                    <div *ngFor="let prod of productos" class="card-producto" (click)="sumarProducto(prod)">
                        <div class="info-prod">
                            <strong>{{ prod.nombre | titlecase }}</strong>
                            <p>{{ prod.precio | currency:'USD':'symbol':'1.2-2' }}</p>
                        </div>

                        <!-- 2. Los controles aparecen si el producto está en el carrito -->
                        <div class="controles-cantidad" *ngIf="obtenerCantidad(prod.id) > 0">
                             <!-- 3. El botón de restar detiene la propagación para no sumar accidentalmente -->
                            <button class="btn-cantidad" (click)="$event.stopPropagation(); restarProducto(prod)">-</button>
                            <span class="cantidad-producto">{{ obtenerCantidad(prod.id) }}</span>
                            <!-- El botón de sumar ha sido eliminado -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
