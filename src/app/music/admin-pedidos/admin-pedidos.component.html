<div class="admin-wrapper">
  <ng-container *ngIf="barValido">
    <nav class="navbar-admin">
      <div class="navbar-content">
        <div class="brand">
          <span class="logo-icon">🎵</span>
          <h2>{{ nombreBarReal }}</h2>
        </div>

        <div class="nav-links">
          <button (click)="seccionActiva = 'musica'" [class.active]="seccionActiva === 'musica'">
            🎹 Música
          </button>
          <button (click)="seccionActiva = 'productos'" [class.active]="seccionActiva === 'productos'">
            🍻 Productos
          </button>
          <button (click)="seccionActiva = 'mesas'" [class.active]="seccionActiva === 'mesas'">
            🪑 Mesas
          </button>
          <button (click)="seccionActiva = 'facturacion'" [class.active]="seccionActiva === 'facturacion'">
            🧾 Facturación
          </button>
        </div>

        <button class="btn-logout" (click)="logout()">
          <span class="icon-exit">🚪</span> Salir
        </button>
      </div>
    </nav>

    <div class="admin-main-container">
      <app-gestion-musica *ngIf="seccionActiva === 'musica'"></app-gestion-musica>
      <app-gestion-productos *ngIf="seccionActiva === 'productos'"></app-gestion-productos>
      <app-gestion-mesas *ngIf="seccionActiva === 'mesas'"></app-gestion-mesas>
      <app-admin-facturacion 
        *ngIf="seccionActiva === 'facturacion'"
        [nombreBar]="nombreBarReal"> 
      </app-admin-facturacion>
    </div>
  </ng-container>
</div>
