<div class="contenedor-principal">
  <!-- Pantallas de estado inicial -->
  <div class="pantalla-estado" *ngIf="cargandoValidacion">
    <div class="loader-simple"></div>
  </div>

  <div *ngIf="barValido && !cargandoValidacion" class="full-layout">
    
    <!-- PANTALLA DE ACCESO PREMIUM -->
    <div class="pantalla-bloqueo" *ngIf="!accesoAutorizado">
      <div class="acceso-premium-container">
        
        <div class="header-bienvenida">
          <h1>¡Hola! <br>Bienvenido a <strong>{{ nombreBarReal }}</strong></h1>
          <p>Ingresa el código que te dio tu mesero para empezar a pedir.</p>
        </div>

        <div class="input-gigante-container">
          <input 
            type="tel" 
            [(ngModel)]="codigoIngresado" 
            maxlength="4" 
            placeholder="0000"
            class="input-codigo-gigante"
            (keyup)="codigoIngresado.length === 4 && validarAcceso()">
        </div>

        <button 
          (click)="validarAcceso()" 
          [disabled]="codigoIngresado.length !== 4"
          class="btn-acceder-premium">
          Entrar ahora
        </button>

      </div>
    </div>

    <!-- VISTA AUTORIZADA -->
    <div class="vista-autorizada-container" *ngIf="accesoAutorizado">
      <div class="tab-selector">
        <button [class.active-music]="vistaActual === 'songs'" (click)="vistaActual = 'songs'">🎵 Música</button>
        <button [class.active-products]="vistaActual === 'products'" (click)="vistaActual = 'products'">🍻 Productos</button>
      </div>

      <div class="window-slider" [@slideContent]="vistaActual">
        <div class="slide-section" *ngIf="vistaActual === 'songs'">
          <app-buscar-canciones [nombreBarUrl]="nombreBarUrl" [idMesaUrl]="idMesaUrl" [numeroMesaReal]="numeroMesaReal" [nombreBarReal]="nombreBarReal"></app-buscar-canciones>
        </div>
        <div class="slide-section" *ngIf="vistaActual === 'products'">
          <app-lista-productos 
            [nombreBarUrl]="nombreBarUrl" 
            [idMesaUrl]="idMesaUrl" 
            [numeroMesaReal]="numeroMesaReal" 
            [codigoAcceso]="codigoAccesoVigente" 
            [resetCarrito]="resetCarritoFlag"
            (carritoActualizado)="onCarritoActualizado($event)">
          </app-lista-productos>
        </div>
      </div>

      <div class="footer-pedido" *ngIf="carrito.length > 0 && vistaActual === 'products'">
        <button class="btn-ver-pedido" (click)="mostrandoResumenPedido = true">🛒 Ver Pedido ({{ carrito.length }})</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" *ngIf="mostrandoResumenPedido" (click)="mostrandoResumenPedido = false">
    <div class="modal-resumen-pedido" (click)="$event.stopPropagation()">
      <h3>Tu Pedido</h3>
      <div *ngFor="let item of carrito" class="item-pedido-resumen">
        <span>{{ item.cantidad }}x {{ item.nombre }}</span>
        <span>{{ (item.precio * item.cantidad) | currency:'USD':'symbol':'1.0-0' }}</span>
      </div>
      <button class="btn-confirmar-pedido" (click)="confirmarPedido()">Confirmar Pedido</button>
    </div>
  </div>
</div>
